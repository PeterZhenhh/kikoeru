# fly.toml app configuration file generated for unikikoeru on 2026-02-12T07:12:33Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'unikikoeru'
swap_size_mb = 2048

[build]

[deploy]
  strategy = "immediate"
  max_unavailable = 1

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'off'
auto_start_machines = true
min_machines_running = 1
processes = ['app']
[http_service.concurrency]
type = "requests"
soft_limit = 1
# hard_limit = 20

